name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commits:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: |
          pattern='^(feat|fix|docs|ci|chore|refactor|test|perf|build|style)(\(.+\))?(!)?: .+'
          base=${{ github.event.pull_request.base.sha }}
          for sha in $(git rev-list "$base"..HEAD); do
            msg=$(git log --format='%s' -1 "$sha")
            if echo "$msg" | grep -qE '^Merge '; then
              continue
            fi
            if ! echo "$msg" | grep -qE "$pattern"; then
              echo "::error::Bad commit message: $msg"
              echo "Expected format: type(scope): description"
              exit 1
            fi
          done

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22.x", "stable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - run: go build ./...
      - run: go test -race -count=1 ./...
      - run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - uses: golangci/golangci-lint-action@v9

  changelog:
    name: Update CHANGELOG
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@2778609c643a39a2576c4bae2e493b855eb4aee8 # v2
      - name: Generate CHANGELOG
        run: git-cliff --output CHANGELOG.md
      - name: Commit CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || {
            git commit -m "docs: update CHANGELOG.md"
            git push
          }

  all-checks:
    name: All checks
    if: always()
    needs: [commits, test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Decide status
        env:
          JOBS_HAVE_FAILURES: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [ "$JOBS_HAVE_FAILURES" = "true" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
